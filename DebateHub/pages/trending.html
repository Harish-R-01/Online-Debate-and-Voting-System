<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trending – DebateHub</title>
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <a href="home.html" class="sidebar-logo">
      <span class="sidebar-logo-icon">🗳️</span>
      <span class="sidebar-logo-text">DebateHub</span>
    </a>
    <nav class="sidebar-nav">
      <span class="sidebar-section-label">Discover</span>
      <a href="home.html"          class="sidebar-link"><span class="link-icon">🏠</span> Home</a>
      <a href="trending.html"      class="sidebar-link active"><span class="link-icon">🔥</span> Trending</a>
      <span class="sidebar-section-label">Debate</span>
      <a href="create_debate.html" class="sidebar-link"><span class="link-icon">➕</span> Create Debate</a>
      <a href="my-debates.html"    class="sidebar-link"><span class="link-icon">📋</span> My Debates</a>
      <a href="bookmarks.html"     class="sidebar-link"><span class="link-icon">🔖</span> Bookmarks</a>
      <span class="sidebar-section-label">Account</span>
      <a href="profile.html"       class="sidebar-link"><span class="link-icon">👤</span> Profile</a>
      <a href="dashboard.html"     class="sidebar-link"><span class="link-icon">📊</span> Dashboard</a>
    </nav>
    <div class="sidebar-user" id="sidebarUser">
      <div class="avatar avatar-sm" id="sidebarAvatar">?</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="sidebarName">Loading…</div>
        <div class="sidebar-user-role">Member</div>
      </div>
    </div>
  </aside>

  <div style="display:flex; flex-direction:column; min-width:0;">
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Open menu">☰</button>
      <h1 style="font-size:1.1rem; font-weight:700;">Trending</h1>
      <div class="topbar-actions" style="margin-left:auto; display:flex; gap:8px;">
        <button class="theme-toggle" id="themeToggle"><span id="themeIcon">🌙</span></button>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign Out</button>
      </div>
    </header>

    <main class="main-content">

      <div style="margin-bottom:var(--space-xl);">
        <h1 style="font-size:1.8rem; font-family:var(--font-heading);">🔥 Trending Debates</h1>
        <p style="color:var(--text-muted); margin-top:4px;">The hottest debates ranked by total votes and views.</p>
      </div>

      <div id="trendingList" class="debate-grid">
        <!-- Skeleton -->
        <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton-body"><div class="skeleton skeleton-line lg"></div><div class="skeleton skeleton-line md"></div></div></div>
        <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton-body"><div class="skeleton skeleton-line lg"></div><div class="skeleton skeleton-line md"></div></div></div>
        <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton-body"><div class="skeleton skeleton-line lg"></div><div class="skeleton skeleton-line md"></div></div></div>
      </div>

    </main>
  </div>
</div>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
  import { getFirestore, collection, getDocs, query, orderBy }
    from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
  import { initTheme, toggleTheme, getVotePercents, timeAgo, categoryColor }
    from "../assets/js/utils.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAGm7xBQ3BY-tUa0wKiyx9_xRtU_I-pphg",
    authDomain: "online-voting-system-7ad10.firebaseapp.com",
    projectId: "online-voting-system-7ad10",
    storageBucket: "online-voting-system-7ad10.appspot.com",
    messagingSenderId: "882341360975",
    appId: "1:882341360975:web:0a6f2d5313d64fef2d013a"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const theme = initTheme();
  document.getElementById("themeIcon").textContent = theme === "dark" ? "☀️" : "🌙";
  document.getElementById("themeToggle").addEventListener("click", () => {
    const next = toggleTheme();
    document.getElementById("themeIcon").textContent = next === "dark" ? "☀️" : "🌙";
  });

  const sidebar = document.getElementById("sidebar");
  document.getElementById("sidebarToggle").addEventListener("click", () => sidebar.classList.toggle("open"));
  document.getElementById("sidebarOverlay").addEventListener("click", () => sidebar.classList.remove("open"));
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut(auth); window.location.href = "../index.html";
  });

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "../index.html"; return; }

    const name = user.displayName || user.email.split("@")[0];
    document.getElementById("sidebarName").textContent = name;
    const av = document.getElementById("sidebarAvatar");
    if (user.photoURL) av.innerHTML = `<img src="${user.photoURL}" alt="${name}"/>`;
    else av.textContent = name.charAt(0).toUpperCase();

    // Load all debates and sort by score
    const snapshot = await getDocs(query(collection(db, "debates"), orderBy("createdAt","desc")));
    const debates  = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

    // Trending score = votes + views
    debates.sort((a, b) =>
      ((b.yesVotes||0)+(b.noVotes||0)+(b.views||0)) -
      ((a.yesVotes||0)+(a.noVotes||0)+(a.views||0))
    );

    const list = document.getElementById("trendingList");

    if (!debates.length) {
      list.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><span class="empty-state-icon">🔥</span><h3>No trending debates yet</h3><p>Be the first to <a href="create_debate.html">create a debate</a>!</p></div>`;
      return;
    }

    list.innerHTML = debates.slice(0, 12).map((d, i) => {
      const { yes, no, total } = getVotePercents(d.yesVotes||0, d.noVotes||0);
      const cat   = d.category || "Other";
      const color = categoryColor(cat);
      return `
        <article class="debate-card animate-in" style="animation-delay:${i*0.05}s;">
          <a href="debate.html?id=${d.id}" style="display:contents; text-decoration:none;">
            <div class="debate-card-img-wrap">
              <img src="${d.imageURL||'../assets/images/default.jpg'}" alt="${d.title||''}" loading="lazy" onerror="this.src='../assets/images/default.jpg'" />
              <span class="debate-card-category" style="background:${color};">${cat}</span>
              <span class="debate-card-status status-${d.status||'active'}">${d.status==='active'?'🟢 Active':'🔴 Closed'}</span>
              <span style="position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,0.6);color:#fff;padding:3px 9px;border-radius:99px;font-size:0.7rem;font-weight:700;backdrop-filter:blur(4px);">#${i+1} Trending</span>
            </div>
            <div class="debate-card-body">
              <h3 class="debate-card-title">${d.title||'Untitled'}</h3>
              <div class="debate-card-meta">
                <span>🕐 ${timeAgo(d.createdAt)}</span>
                <span>👁 ${d.views||0}</span>
                <span>💬 ${d.commentCount||0}</span>
              </div>
              <div class="debate-card-vote">
                <div class="vote-stats">
                  <span class="vote-stat yes">✅ ${yes}%</span>
                  <span class="vote-stat no">❌ ${no}%</span>
                  <span style="margin-left:auto;font-size:0.75rem;color:var(--text-muted);">${total} votes</span>
                </div>
                <div class="progress-bar-track">
                  <div class="progress-bar-fill yes" style="width:${yes}%"></div>
                </div>
              </div>
            </div>
          </a>
          <div class="debate-card-actions">
            <a href="debate.html?id=${d.id}" class="debate-card-action-btn" style="font-weight:600;">Vote Now →</a>
          </div>
        </article>`;
    }).join("");
  });
</script>
</body>
</html>
